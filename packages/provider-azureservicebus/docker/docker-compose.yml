services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: easyqueue-sb-sql
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "EasyQueue@2024!"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EasyQueue@2024!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s

  servicebus:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: easyqueue-servicebus
    ports:
      - "5673:5672"
      - "5300:5300"
    depends_on:
      sql:
        condition: service_healthy
    environment:
      ACCEPT_EULA: Y
      SQL_SERVER: sql
      MSSQL_SA_PASSWORD: "EasyQueue@2024!"
      SQL_SERVER_CONNECTION_STRING: "Server=sql,1433;User Id=sa;Password=EasyQueue@2024!;TrustServerCertificate=True"
    volumes:
      - ./Config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5672/$Resources/Queues?api-version=2021-05"]
      interval: 5s
      retries: 15
      start_period: 20s
