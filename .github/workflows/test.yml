name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: unit
            command: pnpm --filter @easyqueue/desktop test

          - name: e2e
            command: npx playwright install chromium && pnpm --filter @easyqueue/desktop test:e2e
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }} tests
        run: ${{ matrix.command }}
        working-directory: apps/desktop
