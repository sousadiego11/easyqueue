name: Build

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      platform: win
                    - os: ubuntu-latest
                      platform: linux
                    - os: macos-latest
                      platform: mac

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build Vite
              run: npm run build

            - name: Build Electron (${{ matrix.platform }})
              run: npx electron-builder --${{ matrix.platform }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ matrix.platform }}
                  path: |
                      release/*.exe
                      release/*.AppImage
                      release/*.deb
                      release/*.dmg
                      release/*.zip
                  if-no-files-found: warn
